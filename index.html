<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OMG Central</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>OMG Central</h1>
      <p>Large-scale game catalog hub</p>
    </header>

    <main class="layout">
      <aside class="menu">
        <h2>Menu</h2>
        <label>
          Search
          <input id="searchInput" type="search" placeholder="title, tag, source" />
        </label>

        <label>
          Source
          <select id="sourceFilter">
            <option value="all">All sources</option>
          </select>
        </label>

        <label>
          Status
          <select id="statusFilter">
            <option value="all">All statuses</option>
            <option value="verified">Verified</option>
            <option value="pending-import">Pending import</option>
          </select>
        </label>

        <label>
          Category
          <select id="categoryFilter">
            <option value="all">All categories</option>
          </select>
        </label>
      </aside>

      <section class="content">
        <div class="stats" id="stats"></div>
        <div class="games" id="gameGrid"></div>
        <div class="pager">
          <button id="prevBtn">Prev</button>
          <span id="pageLabel">Page 1</span>
          <button id="nextBtn">Next</button>
        </div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
